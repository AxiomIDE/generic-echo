// This file defines the data contracts (messages) for your Axiom package.
// Every node's --input and --output refers to a message defined here.
//
// Run `axiom create message <Name>` to scaffold a new message below.
// Run `axiom generate` to compile these definitions into language bindings in gen/.
//
// DOCUMENTATION
//   Comments written directly above a message or field declaration are extracted
//   automatically at publish time and shown in the Axiom registry as documentation.
//   Write your descriptions there — no separate doc files needed.
//
//   Leading comment  (no blank line before the declaration) → registry description ✓
//   Detached comment (blank line before the declaration)    → ignored by registry  ✗
//
// This file is yours to edit. Axiom only appends new message blocks — it never
// overwrites or removes content you have written.

syntax = "proto3";

package axiom_official.generic_echo;

option go_package = ".;gen";

// EchoInputPlaceholder is the Echo node's NOMINAL input (ADR-118): deliberately
// field-less, since a truly Generic node cannot know an Instance's real input
// shape at publish time. An Instance binds this port to a real, named message
// (its "input facade") via `axiom instance create --input-message ... --input-field
// ...`; at runtime the compiler auto-derives a facade->generic adapter that
// reshapes the facade's real field values into this placeholder's wire bytes —
// each field keyed by NUMBER only (sorted-name assignment, all KIND_STRING),
// never by name, since this message declares none. Echo's own code (nodes/echo.go)
// walks those raw numbered fields structurally rather than assuming any exist.
message EchoInputPlaceholder {
}

// EchoOutputPlaceholder is the Echo node's NOMINAL output (ADR-118): field-less
// for the same reason as EchoInputPlaceholder. Echo emits real values keyed by
// field NUMBER (matching whatever `--output-field` an Instance declares,
// sorted-name numbered); the compiler's auto-derived generic->facade adapter
// projects those numbered fields onto the Instance's real, named output facade.
message EchoOutputPlaceholder {
}

// HTTPRequest is FetchHTTP's GENERIC (ADR-122) input — a real, concrete,
// named message with fields GENERALIZED broad enough to cover every intended
// use of the node (any URL, any method, any headers), unlike
// EchoInputPlaceholder above. An Instance later maps a flow's real,
// narrower shape onto these fields by name — ordinary node code, no wire-byte
// decoding required to read them.
message HTTPRequest {
  string url = 1;
  string method = 2; // "GET", "POST", etc.
  string body = 3;   // request body, empty for GET
}

// HTTPResponse is FetchHTTP's GENERIC (ADR-122) output — same generalized-field
// pattern as HTTPRequest above.
message HTTPResponse {
  int32 status_code = 1;
  string body = 2;
}
